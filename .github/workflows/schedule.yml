name: crew-calendar

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"
    - cron: "0 11 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - run: playwright install

      - run: python main.py
